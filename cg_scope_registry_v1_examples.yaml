publication_policies:
- publication_policy_key: pp_append_only_reviewed
  description: Création uniquement de nouvelles pages après validation humaine ; aucune
    mise à jour de page existante.
  approval_required: true
  create_mode: current_page
  update_mode: none
  publish_after_approval: true
  max_pages_per_operation: 1
  diff_required: true
  rollback_allowed: true
  default_publish_parent_strategy: default_parent_page_id
  default_labels_csv: cg-origin-chatgpt,cg-state-published
  default_content_properties_json: '{"origin": "chatgpt", "managedBy": "cg-mcp-gateway"}'
  notes: Mode recommandé pour comptes-rendus, décisions et synthèses.
- publication_policy_key: pp_managed_sections_reviewed
  description: Mise à jour autorisée uniquement dans des sections balisées cg:managed
    après validation humaine.
  approval_required: true
  create_mode: current_page
  update_mode: managed_sections
  publish_after_approval: true
  max_pages_per_operation: 1
  diff_required: true
  rollback_allowed: true
  default_publish_parent_strategy: target_page_or_default_parent
  default_labels_csv: cg-origin-chatgpt,cg-state-published
  default_content_properties_json: '{"origin": "chatgpt", "managedBy": "cg-mcp-gateway",
    "updateMode": "managed_sections"}'
  notes: À utiliser pour runbooks, feuilles d’action, pages de pilotage vivantes.
- publication_policy_key: pp_draft_only_human_publish
  description: Le publisher ne crée qu’un brouillon ou une page en AI Inbox ; la publication
    finale est effectuée manuellement par l’approbateur dans Confluence.
  approval_required: true
  create_mode: draft_only
  update_mode: none
  publish_after_approval: false
  max_pages_per_operation: 1
  diff_required: true
  rollback_allowed: true
  default_publish_parent_strategy: ai_inbox_page_id
  default_labels_csv: cg-origin-chatgpt,cg-state-pending
  default_content_properties_json: '{"origin": "chatgpt", "managedBy": "cg-mcp-gateway",
    "lifecycle": "pending_manual_publish"}'
  notes: Mode le plus prudent pour espaces clients sensibles.
