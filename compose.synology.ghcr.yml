services:
  postgres:
    image: postgres:16-alpine
    container_name: cg-gateway-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "listen_addresses=*"]
    # Published on the Synology host so the application container can connect
    # through host networking when bridge traffic is unreliable on DSM.
    expose:
      - "5432"
    env_file:
      - ./.env.synology.ghcr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    networks:
      backend:
        aliases:
          - postgres
          - cg-gateway-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mcp-server:
    image: ${GHCR_IMAGE:-ghcr.io/elastic21/capsuleai-synology-mcp-gateway:latest}
    container_name: cg-gateway-mcp
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.synology.ghcr
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:$${PORT:-8787}/\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

networks:
  backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

volumes:
  postgres-data:
