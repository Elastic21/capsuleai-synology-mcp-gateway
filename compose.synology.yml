services:
  postgres:
    image: postgres:16-alpine
    container_name: cg-gateway-postgres
    restart: unless-stopped
    env_file:
      - ./.env.synology
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mcp-server:
    image: cybergogne-gateway-mcp:synology
    container_name: cg-gateway-mcp
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.synology
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:$${PORT:-8787}/\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
