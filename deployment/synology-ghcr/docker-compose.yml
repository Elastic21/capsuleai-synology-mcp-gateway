services:
  postgres:
    image: postgres:16-alpine
    container_name: cg-gateway-postgres
    restart: unless-stopped
    # Internal service only: do not publish 5432 on the Synology host.
    expose:
      - "5432"
    env_file:
      - ./.env.synology.ghcr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mcp-server:
    image: ${GHCR_IMAGE:-ghcr.io/elastic21/capsuleai-synology-mcp-gateway:latest}
    container_name: cg-gateway-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env.synology.ghcr
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:$${PORT:-8787}/\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
